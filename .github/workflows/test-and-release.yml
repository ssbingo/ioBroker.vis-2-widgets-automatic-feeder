# This is a composition of lint and test scripts
# Make sure to update this file along with the others

name: Test and Release

# Run this job on all pushes and pull requests
# as well as tags with a semantic version
on:
    push:
        branches:
            - '*'
        tags:
            # normal versions
            - 'v?[0-9]+.[0-9]+.[0-9]+'
            # pre-releases
            - 'v?[0-9]+.[0-9]+.[0-9]+-**'
    pull_request: {}

# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
    group: ${{ github.ref }}
    cancel-in-progress: true

jobs:
    # Performs quick checks (lint + package test) before the expensive build/deploy
    check-and-lint:
        if: contains(github.event.head_commit.message, '[skip ci]') == false

        runs-on: ubuntu-latest

        steps:
            - uses: ioBroker/testing-action-check@v2
              with:
                  node-version: '24.x'
                  # The widgets live in the src-widgets-ts workspace; install it too so that
                  # "npm run lint" (which runs eslint inside src-widgets-ts) resolves its deps.
                  install-command: 'npm i && npm --prefix src-widgets-ts i'
                  lint: true

    # Builds the widget bundle and runs the package sanity test
    adapter-tests:
        needs: [check-and-lint]
        if: contains(github.event.head_commit.message, '[skip ci]') == false

        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7

            - name: Use Node.js 24.x
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x

            - name: Install Dependencies
              run: npm i

            - name: Build
              run: npm run build

            - name: Run local tests
              run: npm test

    # Deploys the final package to npm using npm trusted publishing (OIDC).
    # No NPM_TOKEN is used; npm verifies the GitHub OIDC token via "id-token: write" and
    # automatically attaches a provenance statement. Prerequisite: a trusted publisher is
    # configured for this package on npmjs.com (repository ssbingo/ioBroker.vis-2-widgets-automatic-feeder,
    # workflow test-and-release.yml). See https://docs.npmjs.com/trusted-publishers
    deploy:
        needs: [check-and-lint, adapter-tests]

        # Trigger this step only when a commit is tagged with a version number
        if: |
            contains(github.event.head_commit.message, '[skip ci]') == false &&
            github.event_name == 'push' &&
            startsWith(github.ref, 'refs/tags/v')

        runs-on: ubuntu-latest

        # id-token: write enables npm trusted publishing (OIDC); contents: write creates the GitHub release
        permissions:
            id-token: write
            contents: write

        steps:
            - uses: ioBroker/testing-action-deploy@v1.5.1
              with:
                  node-version: '24.x'
                  install-command: 'npm i'
                  build: true
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  # No npm-token: publishing uses npm trusted publishing (OIDC), which also
                  # produces the provenance attestation. Do NOT add npm-token here.
