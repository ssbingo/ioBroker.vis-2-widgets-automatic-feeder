# Automatically enable auto-merge on Dependabot PRs for non-major (patch/minor) updates.
# Uses the built-in GITHUB_TOKEN (no personal access token / secret required).
#
# Requirement: enable "Allow auto-merge" under Settings -> General -> Pull Requests.
# The PR is then merged automatically once the required status checks pass.
# Major updates are intentionally left for manual review (see .github/dependabot.yml ignores).

name: Auto-Merge Dependabot PRs

on: pull_request

permissions:
    contents: write
    pull-requests: write

jobs:
    dependabot:
        runs-on: ubuntu-latest
        if: github.actor == 'dependabot[bot]'
        steps:
            - name: Fetch Dependabot metadata
              id: meta
              uses: dependabot/fetch-metadata@v3
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Enable auto-merge for patch and minor updates
              if: |
                  steps.meta.outputs.update-type == 'version-update:semver-patch' ||
                  steps.meta.outputs.update-type == 'version-update:semver-minor'
              run: gh pr merge --auto --squash "$PR_URL"
              env:
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
